<!DOCTYPE html>
<html>
<head>
    <title>Catálogo de Áreas</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            margin:0;
            background:#f7f8fa;
        }

        .topbar{
            background:white;
            border-bottom:1px solid #ddd;
            padding:18px 24px;
        }

        .titulo{
            margin:0;
            font-size:28px;
            font-weight:800;
            color:#1f2937;
        }

        .acciones{
            padding:14px 24px;
            display:flex;
            gap:10px;
            flex-wrap:wrap;
            background:#eef2f7;
            border-bottom:1px solid #dbe2ea;
        }

        .btn{
            background:#374151;
            color:white;
            text-decoration:none;
            padding:8px 12px;
            border-radius:8px;
            font-size:13px;
            font-weight:600;
            border:none;
            cursor:pointer;
        }

        .btn.nuevo{
            background:#2563eb;
        }

        .contenedor{
            padding:20px 24px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
        }

        th, td{
            border:1px solid #ddd;
            padding:8px 10px;
            text-align:left;
            font-size:14px;
        }

        th{
            background:#f3f4f6;
            font-weight:700;
        }

        .estado-on{
            color:green;
            font-weight:700;
        }

        .estado-off{
            color:#b91c1c;
            font-weight:700;
        }

        .acciones-col{
            display:flex;
            gap:6px;
            flex-wrap:wrap;
        }

        form{
            display:inline;
        }
    </style>
</head>
<body>

    <div class="topbar">
        <h1 class="titulo">Catálogo de Áreas</h1>
    </div>

    <div class="acciones">
        <a href="/menu" class="btn">Menú principal</a>
        <a href="/catalogos/areas/nueva?admin_key={{ admin_key }}" class="btn nuevo">Nueva área</a>
    </div>

    <div class="contenedor">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Clave</th>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Orden</th>
                    <th>Activo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for a in areas %}
                <tr>
                    <td>{{ a.id_area }}</td>
                    <td>{{ a.clave_area }}</td>
                    <td>{{ a.nombre_area }}</td>
                    <td>{{ a.descripcion }}</td>
                    <td>{{ a.orden_visual }}</td>
                    <td>
                        {% if a.activo %}
                            <span class="estado-on">Sí</span>
                        {% else %}
                            <span class="estado-off">No</span>
                        {% endif %}
                    </td>
                    <td>
                        <div class="acciones-col">
                            <a href="/catalogos/areas/{{ a.id_area }}/editar?admin_key={{ admin_key }}" class="btn">Editar</a>

                            <form method="post" action="/catalogos/areas/{{ a.id_area }}/toggle">
                                <input type="hidden" name="admin_key" value="{{ admin_key }}">
                                <button type="submit" class="btn">
                                    {% if a.activo %}Desactivar{% else %}Activar{% endif %}
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
