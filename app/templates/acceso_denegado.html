<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Denegado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .contenedor {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            text-align: center;
            max-width: 400px;
        }

        .icono {
            font-size: 60px;
            margin-bottom: 20px;
        }

        h1 {
            color: #1f2937;
            font-size: 28px;
            margin-bottom: 10px;
        }

        p {
            color: #6b7280;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .botones {
            display: flex;
            gap: 12px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-reintentar {
            background: #667eea;
            color: white;
        }

        .btn-reintentar:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-menu {
            background: #e5e7eb;
            color: #1f2937;
        }

        .btn-menu:hover {
            background: #d1d5db;
            transform: translateY(-2px);
        }

        .codigo {
            background: #f3f4f6;
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            color: #6b7280;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="contenedor">
        <div class="icono">🔐</div>
        <h1>Acceso Denegado</h1>
        <p>La clave de administrador es incorrecta. Por favor, intenta de nuevo.</p>
        
        <div class="botones">
            <button class="btn-reintentar" onclick="history.back()">Reintentar</button>
            <button class="btn-menu" onclick="window.location.href='/menu'">Volver al Menú</button>
        </div>

        <div class="codigo">Error 403 - Acceso No Autorizado</div>
    </div>
</body>
</html>
